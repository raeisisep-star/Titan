name: Deploy API to Server

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: {}

concurrency:
  group: deploy-api
  cancel-in-progress: true

env:
  HOST: 188.40.209.82
  USER: root
  BRANCH: main
  API_SUBDIR: "."                              # اگر کد بک‌اند داخل پوشه api است، بگذار: api
  REPO_URL: "git@github.com:raeisisep-star/Titan.git"

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout (read-only)
        uses: actions/checkout@v4

      # اختیاری: اعتماد به host؛ بد نیست داشته باشیم
      - name: Trust server host key
        run: ssh-keyscan -H $HOST >> ~/.ssh/known_hosts

      - name: SSH to server & deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.HOST }}
          username: ${{ env.USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}   # حتماً Secret با این اسم بساز
          script_stop: true
          script: |
            export BRANCH="${{ env.BRANCH }}"
            export API_SUBDIR="${{ env.API_SUBDIR }}"
            export REPO_URL="${{ env.REPO_URL }}"
            bash /opt/titan-api/bin/deploy.sh
