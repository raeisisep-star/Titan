name: Deploy Backend

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect backend path
        id: detect
        run: |
          set -e
          CANDIDATES=("." "backend" "api" "server")
          PICK=""
          for p in "${CANDIDATES[@]}"; do
            if [ -f "$p/server.js" ] && [ -f "$p/package.json" ]; then
              PICK="$p"
              break
            fi
          done
          if [ -z "$PICK" ]; then
            # جستجوی عمومی
            PICK=$(git ls-files | grep -E 'server\.js$' | grep -v node_modules | head -n1 | xargs dirname || true)
          fi
          if [ -z "$PICK" ]; then
            echo "No server.js found!" >&2
            exit 1
          fi
          echo "path=$PICK" >> $GITHUB_OUTPUT
          echo "Detected backend path: $PICK"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Add SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Known hosts
        run: ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Rsync backend to release dir
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          BACKEND_DIR: ${{ steps.detect.outputs.path }}
          SHA: ${{ github.sha }}
        run: |
          set -e
          RELEASE="/opt/titan-api/releases/$SHA"
          ssh ${DEPLOY_USER}@${DEPLOY_HOST} "mkdir -p ${RELEASE}"
          rsync -az --delete \
            --exclude ".git" --exclude "node_modules" --exclude ".env" \
            "${BACKEND_DIR}/" ${DEPLOY_USER}@${DEPLOY_HOST}:"${RELEASE}/"

      - name: Finalize on server (build, migrate, switch, pm2, cleanup)
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          SHA: ${{ github.sha }}
        run: |
          ssh ${DEPLOY_USER}@${DEPLOY_HOST} "bash /opt/titan-api/bin/finalize_release.sh /opt/titan-api/releases/${SHA} 7"

      - name: Print current release list
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          ssh ${DEPLOY_USER}@${DEPLOY_HOST} "ls -1t /opt/titan-api/releases | head -n 10 && readlink -f /opt/titan-api/current"
